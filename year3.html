<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yield • CMYK Exhibition 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0; background: #FFFF00; font-family: system-ui, sans-serif;
    padding: 50px 20px; position: relative; min-height: 100vh;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.18) 1px, transparent 1px);
    background-size: 24px 24px; z-index: 0; pointer-events: none;
  }
  body::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
    background-size: 120px 120px; z-index: 0; pointer-events: none;
  }
  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
  .title-block {
    text-align: center; margin-bottom: 8px;
    border-bottom: 2px solid rgba(0,0,0,0.3);
    display: inline-block; padding-bottom: 6px;
  }
  h1 { font-size: 2.8rem; color: #111; letter-spacing: -1px; font-weight: 700; }
  .subtitle {
    text-align: center; color: #333;
    font-size: 0.95rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 50px;
  }
  .nav { text-align: center; margin-bottom: 40px; }
  .nav a { color: #111; text-decoration: none; opacity: 0.7; font-size: 0.95rem; letter-spacing: 1px; }
  .nav a:hover { opacity: 1; }
  .students { display: grid; gap: 12px; max-width: 700px; margin: 0 auto; }
  .student {
    background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1);
    border-radius: 4px; padding: 20px 28px; transition: all .3s ease;
  }
  .student:hover { background: rgba(0,0,0,0.1); transform: translateX(4px); }
  .student a { color: #111; text-decoration: none; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="container">
  <div style="text-align:center;"><div class="title-block"><h1>Yield</h1></div></div>
  <div class="subtitle">Yield · Year 3</div>
  <div class="nav"><a href="index.html">← Back to Home</a></div>
  <div class="students">
    <div class="student"><a href="jonathan-edora-sarmiento/">Jonathan Edora Sarmiento</a></div>
    <div class="student"><a href="thant-sinn-linn-myint/">Thant Sin Linn Myint</a></div>
  </div>
</div>
</body>
</html>
